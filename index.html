            e("div",{key:d,style:{background:DIFF_COLOR[d]+"15",border:"1px solid "+DIFF_COLOR[d]+"44",borderRadius:8,padding:"8px 10px",flex:1,minWidth:70,textAlign:"center"}},
              e("div",{style:{fontSize:18,fontWeight:800,color:DIFF_COLOR[d],fontFamily:"monospace"}},d),
              e("div",{style:{fontSize:11,color:DIFF_COLOR[d],fontWeight:600,marginTop:1}},l),
              e("div",{style:{fontSize:9,color:"#3D6B4A",marginTop:2}},desc)
            )
          )
        )
      ),
      e("div",{style:{background:"#0F1912",border:"1px solid #1E3525",borderRadius:14,padding:"14px 18px",marginBottom:12}},
        e("div",{style:{fontSize:11,color:"#3D6B4A",fontFamily:"monospace",marginBottom:10}},"整體完成統計"),
        e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:10}},
          [{val:count,label:"已完成",col:"#52C78A"},{val:100-count,label:"待征服",col:"#3D6B4A"},{val:pct+"%",label:"完成率",col:"#F5A623"}].map(s=>
            e("div",{key:s.label,style:{textAlign:"center"}},e("div",{style:{fontSize:24,fontWeight:800,color:s.col,lineHeight:1}},s.val),e("div",{style:{fontSize:10,color:"#2E4E36",fontFamily:"monospace",marginTop:3}},s.label))
          )
        ),
        e("div",{style:{background:"#0C1610",borderRadius:5,height:6,overflow:"hidden"}},e("div",{style:{height:"100%",borderRadius:5,background:"linear-gradient(90deg,#2A7A50,#52C78A)",width:pct+"%"}}))
      ),
      e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
        groupStats.map(g=>{
          const c=g.pct>=80?"#52C78A":g.pct>=50?"#F5A623":g.pct>0?"#5B9BD5":"#2A4030";
          const gPeaks=PEAKS.filter(p=>p.group===g.name);
          return e("div",{key:g.name,style:{background:"#0F1912",border:"1px solid #182A1E",borderRadius:14,padding:"14px 16px"}},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
              e("div",null,e("div",{style:{fontSize:15,fontWeight:600,color:"#C8C0AA"}},g.name),e("div",{style:{fontSize:11,color:"#2E4E36",fontFamily:"monospace",marginTop:2}},g.done+" / "+g.total+" 座完成")),
              e("div",{style:{fontSize:26,fontWeight:900,color:c}},g.pct+"%")
            ),
            e("div",{style:{background:"#0C1610",borderRadius:4,height:4,overflow:"hidden",marginBottom:10}},e("div",{style:{height:"100%",borderRadius:4,background:c,width:g.pct+"%",minWidth:g.pct>0?4:0}})),
            e("div",{style:{display:"flex",flexWrap:"wrap",gap:4}},
              gPeaks.map(p=>e("div",{key:p.id,title:p.name+" "+p.difficulty,className:"dot"+(completed.has(p.id)?" done":""),onClick:()=>toggle(p.id)},completed.has(p.id)?"✓":""))
            ),
            g.done>0&&e("div",{style:{marginTop:8,fontSize:10,color:"#3D6B4A",fontFamily:"monospace",lineHeight:1.6}},gPeaks.filter(p=>completed.has(p.id)).map(p=>p.name).join("、"))
          );
        })
      )
    ),
    e("div",{style:{height:48}})
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
</script>
</body>
</html>
