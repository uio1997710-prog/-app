setSaving(false);
};

const togglePeak=async(id)=>{
const s=new Set(completed);s.has(id)?s.delete(id):s.add(id);
setCompleted(s);syncDB({completed:[…s]});
};

const toggleGear=async(id)=>{
const n={…gearChecked,[id]:!gearChecked[id]};
setGearChecked(n);syncDB({gearChecked:n});
};

const saveNote=async(id,val)=>{
const n={…gearNotes,[id]:val};
setGearNotes(n);syncDB({gearNotes:n});
};

const deleteGearItem=(type,cat,id)=>{
const n=JSON.parse(JSON.stringify(gearList));
const c=n[type].find(c=>c.cat===cat);
if(c)c.items=c.items.filter(i=>i.id!==id);
setGearList(n);syncDB({gearList:n});
};

const addGearItem=(type,cat)=>{
if(!newItemName.trim())return;
const n=JSON.parse(JSON.stringify(gearList));
const c=n[type].find(c=>c.cat===cat);
const newId=“custom_”+Date.now();
if(c)c.items.push({id:newId,name:newItemName.trim(),note:””,must:false});
setGearList(n);syncDB({gearList:n});
setNewItemName(””);setAddingCat(null);
};

const resetGear=(type)=>{
if(!confirm(“確定要初始化「”+type+”」裝備清單？所有自訂項目將消失，勾選也會清空。”))return;
const n=JSON.parse(JSON.stringify(gearList));
n[type]=JSON.parse(JSON.stringify(DEFAULT_GEAR[type]));
setGearList(n);
// 清除該類型的勾選
const checkedKeys=Object.keys(gearChecked).filter(k=>{
const allIds=DEFAULT_GEAR[type].flatMap(c=>c.items.map(i=>i.id));
return allIds.includes(k)||k.startsWith(type===“輕裝”?“g”:“h”);
});
const newChecked={…gearChecked};
checkedKeys.forEach(k=>delete newChecked[k]);
setGearChecked(newChecked);
syncDB({gearList:n,gearChecked:newChecked});
};

const selectAllGear=(type,val)=>{
const ids=gearList[type].flatMap(c=>c.items.map(i=>i.id));
const n={…gearChecked};
ids.forEach(id=>n[id]=val);
setGearChecked(n);syncDB({gearChecked:n});
};
