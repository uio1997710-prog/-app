// 台灣地圖 SVG 座標轉換（lat/lng → svg x/y）
// 台灣範圍: lng 120.0~122.0, lat 21.9~25.3
function toSVG(lat,lng){
  const x=((lng-119.9)/(122.2-119.9))*220+20;
  const y=((25.5-lat)/(25.5-21.8))*440+20;
  return[Math.round(x),Math.round(y)];
}

function getBadge(n){
  if(n>=100)return{icon:"👑",label:"完百傳奇"};
  if(n>=84)return{icon:"🌟",label:"縱走達人"};
  if(n>=69)return{icon:"🦅",label:"高山行者"};
  if(n>=49)return{icon:"⛰️",label:"進階山人"};
  if(n>=29)return{icon:"🥾",label:"山徑探索者"};
  if(n>=14)return{icon:"🍃",label:"健行者"};
  return{icon:"🌱",label:"入門山友"};
}

            setGearNotes(d.gearNotes||{});
            if(d.gearList)setGearList(d.gearList);
          }
        }catch(err){console.log(err);}
      }
    });
    return()=>unsub();
  },[]);

    setSaving(false);
  };

  const togglePeak=async(id)=>{
    const s=new Set(completed);
    s.has(id)?s.delete(id):s.add(id);
    setCompleted(s);
    syncDB({completed:Array.from(s)});
  };
  const toggleGear=async(id)=>{
    const n=Object.assign({},gearChecked);
    n[id]=!n[id];
    setGearChecked(n);syncDB({gearChecked:n});
  };

    const n=Object.assign({},gearNotes);
    n[id]=val;
    setGearNotes(n);syncDB({gearNotes:n});
  };
  const deleteGearItem=(type,cat,id)=>{
    const n=JSON.parse(JSON.stringify(gearList));
    const c=n[type].find(function(x){return x.cat===cat;});
    if(c)c.items=c.items.filter(function(i){return i.id!==id;});
    setGearList(n);syncDB({gearList:n});
  };
  const addGearItem=(type,cat)=>{
    if(!newItemName.trim())return;
    const n=JSON.parse(JSON.stringify(gearList));
    const c=n[type].find(function(x){return x.cat===cat;});
    if(c)c.items.push({id:"custom_"+Date.now(),name:newItemName.trim(),note:"",must:false});
    setGearList(n);syncDB({gearList:n});
