const DIFF_INFO=[["A","簡單","1-3天一般健行"],["B","普通","多天需體能"],["C","困難","技術性路線"],["C+","極難","高風險縱走"]];

function getBadge(n){
  if(n>=100)return{icon:"👑",label:"完百傳奇"};
  if(n>=84)return{icon:"🌟",label:"縱走達人"};
  if(n>=69)return{icon:"🦅",label:"高山行者"};
  if(n>=49)return{icon:"⛰️",label:"進階山人"};
  if(n>=29)return{icon:"🥾",label:"山徑探索者"};
  if(n>=14)return{icon:"🍃",label:"健行者"};
  return{icon:"🌱",label:"入門山友"};
}

// React App

        e("path",{fill:"#1976D2",d:"M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.7 35.5 44 30.2 44 24c0-1.3-.1-2.7-.4-4z"})

function App(){
  const[user,setUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[loginLoading,setLoginLoading]=useState(false);
  const[completed,setCompleted]=useState(new Set());
  const[search,setSearch]=useState("");
  const[group,setGroup]=useState("全部");
  const[tab,setTab]=useState("列表");
  const[status,setStatus]=useState("全部");
  const[diff,setDiff]=useState("全部");
  const[saving,setSaving]=useState(false);
  const[gearType,setGearType]=useState("輕裝");
  const[gearChecked,setGearChecked]=useState({});
  const[gearNotes,setGearNotes]=useState({});
  const[gearDetail,setGearDetail]=useState(null); // 目前展開的裝備id

  // 監聽登入狀態
  useEffect(()=>{
    const unsub=onAuthStateChanged(auth,async u=>{
      setUser(u);
      setAuthLoading(false);
      if(u){
        // 載入雲端資料
        try{
          const ref=doc(db,"users",u.uid);
          const snap=await getDoc(ref);
          if(snap.exists()){
            const data=snap.data();
            setCompleted(new Set(data.completed||[]));
            setGearChecked(data.gearChecked||{});
            setGearNotes(data.gearNotes||{});
          }
        }catch(err){console.log(err);}
      }
    });
    return()=>unsub();
  },[]);

  const handleLogin=async()=>{
    setLoginLoading(true);
    try{
      const provider=new GoogleAuthProvider();
      await signInWithPopup(auth,provider);
    }catch(err){
      console.log(err);
      alert("登入失敗，請再試一次");
    }
    setLoginLoading(false);
  };

  const handleLogout=async()=>{
    if(confirm("確定要登出嗎？")){
      await signOut(auth);
      setCompleted(new Set());
    }
  };

  const toggleGear=async(id)=>{
    const next={...gearChecked,[id]:!gearChecked[id]};
    setGearChecked(next);
    try{await setDoc(doc(db,"users",user.uid),{gearChecked:next},{merge:true});}catch(e){}
  };
  const saveNote=async(id,val)=>{
    const next={...gearNotes,[id]:val};
    setGearNotes(next);
    try{await setDoc(doc(db,"users",user.uid),{gearNotes:next},{merge:true});}catch(e){}
  };

  const toggle=async(id)=>{
    const s=new Set(completed);
    s.has(id)?s.delete(id):s.add(id);
    setCompleted(s);
    // 儲存到雲端
    setSaving(true);
    try{
      await setDoc(doc(db,"users",user.uid),{completed:[...s]},{merge:true});
    }catch(err){console.log(err);}
    setSaving(false);
  };

  const count=completed.size,pct=count,badge=getBadge(pct),C=2*Math.PI*40;
  const filtered=useMemo(()=>PEAKS.filter(p=>{
    if(search&&!p.name.includes(search)&&!p.group.includes(search))return false;
    if(group!=="全部"&&p.group!==group)return false;
    if(status==="已完成"&&!completed.has(p.id))return false;
    if(status==="未完成"&&completed.has(p.id))return false;
    if(diff!=="全部"&&p.difficulty!==diff)return false;
    return true;
  }),[search,group,status,diff,completed]);

  const groupStats=GROUPS.map(g=>{
    const all=PEAKS.filter(p=>p.group===g),done=all.filter(p=>completed.has(p.id));
    return{name:g,total:all.length,done:done.length,pct:Math.round(done.length/all.length*100)};
  }).sort((a,b)=>b.pct-a.pct);

  const rc=pct>=75?"#52C78A":pct>=40?"#F5A623":"#5B9BD5";
  const e=React.createElement;

  // 載入中
  if(authLoading) return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#0C1610"}},
    e("div",{style:{color:"#3D6B4A",fontFamily:"monospace",fontSize:13}},"載入中...")
  );

  // 未登入
  if(!user) return e(LoginScreen,{onLogin:handleLogin,loading:loginLoading});

  // 已登入
  return e("div",{style:{background:"#0C1610",minHeight:"100vh",color:"#DDD5BE",maxWidth:430,margin:"0 auto",overflowX:"hidden"}},

    // HEADER
    e("div",{style:{position:"relative",overflow:"hidden"}},
      e("div",{style:{position:"absolute",inset:0,background:"linear-gradient(160deg,#0C2418,#0C1610 60%)"}}),
      e("div",{style:{position:"relative",padding:"48px 24px 0"}},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
          e("div",{style:{fontSize:10,letterSpacing:5,color:"#3D6B4A",fontFamily:"monospace"}},"TAIWAN · 台灣百岳"),
          e("div",{style:{display:"flex",alignItems:"center",gap:8}},
            saving&&e("span",{style:{fontSize:10,color:"#3D6B4A",fontFamily:"monospace"}},"儲存中..."),
            e("button",{onClick:handleLogout,style:{background:"none",border:"1px solid #2A4030",borderRadius:8,padding:"4px 10px",color:"#3D6B4A",fontSize:11,cursor:"pointer",fontFamily:"monospace"}},"登出")
          )
        ),
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
          e("div",null,
            e("h1",{style:{margin:0,fontSize:28,fontWeight:700,lineHeight:1.2}},"百岳完成度",e("br"),e("span",{style:{color:"#52C78A"}},"追蹤")),
            e("div",{style:{marginTop:6,display:"flex",alignItems:"center",gap:6}},
              e("img",{src:user.photoURL,style:{width:18,height:18,borderRadius:"50%"},onError:ev=>ev.target.style.display="none"}),
              e("span",{style:{fontSize:11,color:"#3D6B4A",fontFamily:"monospace"}},user.displayName||user.email)
            ),
            e("div",{style:{marginTop:6,display:"flex",alignItems:"center",gap:8}},
              e("span",{style:{fontSize:16}},badge.icon),
              e("span",{style:{fontSize:12,color:"#3D6B4A",fontFamily:"monospace"}},badge.label)
            )
          ),
          e("div",{style:{position:"relative",width:96,height:96}},
            e("svg",{width:96,height:96,style:{transform:"rotate(-90deg)"}},
              e("circle",{cx:48,cy:48,r:40,fill:"none",stroke:"#1A3525",strokeWidth:8}),
              e("circle",{cx:48,cy:48,r:40,fill:"none",stroke:rc,strokeWidth:8,strokeDasharray:C,strokeDashoffset:C*(1-pct/100),strokeLinecap:"round"})
            ),
            e("div",{style:{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
              e("span",{style:{fontSize:22,fontWeight:800,lineHeight:1}},pct+"%"),
              e("span",{style:{fontSize:9,color:"#3D6B4A",fontFamily:"monospace"}},count+"/100")
            )
          )
        ),
        e("div",{style:{marginTop:16}},
          e("div",{style:{background:"#152218",borderRadius:6,height:6,overflow:"hidden"}},
            e("div",{style:{height:"100%",borderRadius:6,background:"linear-gradient(90deg,#2A7A50,#52C78A)",width:pct+"%"}})
          ),
          e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:"#3D6B4A",fontFamily:"monospace",marginTop:5}},
            e("span",null,"✓ "+count+" 座已完成"),
            e("span",null,(100-count)+" 座待征服")
          )
        )
      ),
      e("svg",{viewBox:"0 0 430 70",style:{width:"100%",display:"block",marginTop:16,opacity:0.1}},
        e("polygon",{points:"0,70 80,15 140,45 220,2 300,35 360,10 430,40 430,70",fill:"#4CAF8A"}),
        e("polygon",{points:"0,70 60,30 110,55 180,14 260,45 330,18 400,44 430,30 430,70",fill:"#2A5A3A"})
      )
    ),

    // TABS
    e("div",{style:{position:"sticky",top:0,zIndex:20,background:"#0C1610ee",borderBottom:"1px solid #1A3020",display:"flex"}},
      ["列表","群組","裝備"].map(t=>e("button",{key:t,className:"tab-btn"+(tab===t?" active":""),onClick:()=>setTab(t)},t))
    ),

    // 列表 TAB
    tab==="列表"&&e("div",{style:{padding:"14px 16px"}},
      e("div",{style:{background:"#111C14",border:"1px solid #1E3525",borderRadius:10,padding:"9px 14px",display:"flex",alignItems:"center",gap:8,marginBottom:10}},
        e("span",{style:{color:"#3D6B4A"}},"🔍"),
        e("input",{value:search,onChange:ev=>setSearch(ev.target.value),placeholder:"搜尋山峰或群組...",style:{flex:1,background:"none",border:"none",outline:"none",color:"#DDD5BE",fontSize:14}}),
        search&&e("span",{onClick:()=>setSearch(""),style:{color:"#3D6B4A",cursor:"pointer",fontSize:20}},"×")
      ),
      e("div",{style:{display:"flex",gap:6,marginBottom:8}},
        ["全部","已完成","未完成"].map(f=>e("button",{key:f,className:"chip"+(status===f?" active":""),onClick:()=>setStatus(f)},f))
      ),
      e("div",{style:{display:"flex",gap:5,marginBottom:8}},
        ["全部","A","B","C","C+"].map(d=>e("button",{key:d,onClick:()=>setDiff(d),style:{
          padding:"4px 12px",borderRadius:20,fontSize:11,cursor:"pointer",fontFamily:"monospace",
          background:diff===d?(d==="全部"?"#1D4A2A":DIFF_COLOR[d]+"33"):"transparent",
          border:"1px solid "+(diff===d?(d==="全部"?"#52C78A":DIFF_COLOR[d]):"#1A3020"),
          color:diff===d?(d==="全部"?"#7AD9A8":DIFF_COLOR[d]):"#3A5042",
        }},d))
      ),
      e("div",{style:{display:"flex",gap:5,marginBottom:10,overflowX:"auto",paddingBottom:4}},
        ["全部",...GROUPS].map(g=>e("button",{key:g,className:"rchip"+(group===g?" active":""),onClick:()=>setGroup(g)},g))
      ),
      e("div",{style:{background:"#0F1912",border:"1px solid #1E3525",borderRadius:12,padding:"10px 14px",marginBottom:12}},
        e("div",{style:{fontSize:10,color:"#3D6B4A",fontFamily:"monospace",marginBottom:8,letterSpacing:2}},"難度分級"),
        e("div",{style:{display:"flex",gap:6}},
          DIFF_INFO.map(([d,l,desc])=>e("div",{key:d,style:{flex:1,background:DIFF_COLOR[d]+"15",border:"1px solid "+DIFF_COLOR[d]+"44",borderRadius:8,padding:"8px 6px",textAlign:"center"}},
            e("div",{style:{fontSize:16,fontWeight:800,color:DIFF_COLOR[d],fontFamily:"monospace",lineHeight:1}},d),
            e("div",{style:{fontSize:10,color:DIFF_COLOR[d],fontWeight:600,marginTop:3}},l),
            e("div",{style:{fontSize:9,color:"#3D6B4A",marginTop:2,lineHeight:1.3}},desc)
          ))
        )
      ),
      e("div",{style:{fontSize:11,color:"#2E4E36",fontFamily:"monospace",marginBottom:10}},"顯示 "+filtered.length+" / 100　· 點擊勾選"),
      e("div",null,
        filtered.map(peak=>{
          const done=completed.has(peak.id),dc=DIFF_COLOR[peak.difficulty];
          return e("div",{key:peak.id,className:"peak-card"+(done?" done":""),onClick:()=>toggle(peak.id)},
            e("div",{className:"checkbox"+(done?" done":"")},
              done&&e("svg",{width:12,height:12,viewBox:"0 0 12 12",fill:"none"},e("path",{d:"M2 6l3 3 5-5",stroke:"#0C1610",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"}))
            ),
            e("div",{style:{flex:1,minWidth:0}},
              e("div",{style:{fontSize:15,fontWeight:done?600:400,color:done?"#86D4AA":"#C8C0AA"}},
                peak.name,e("span",{style:{fontSize:10,color:"#2E4E36",marginLeft:7,fontFamily:"monospace"}},"#"+String(peak.id).padStart(3,"0"))
              ),
              e("div",{style:{fontSize:11,color:"#2E4E36",fontFamily:"monospace",marginTop:2}},peak.alt.toLocaleString()+" m · "+peak.group)
            ),
            e("div",{style:{flexShrink:0,textAlign:"center"}},
              e("div",{style:{background:dc+"22",border:"1px solid "+dc,borderRadius:6,padding:"3px 8px",fontSize:12,fontWeight:700,color:dc,fontFamily:"monospace"}},peak.difficulty),
              e("div",{style:{fontSize:9,color:dc,marginTop:2,fontFamily:"monospace"}},peak.difficulty==="A"?"簡單":peak.difficulty==="B"?"普通":peak.difficulty==="C"?"困難":"極難")
            )
          );
        }),
        filtered.length===0&&e("div",{style:{textAlign:"center",padding:"48px 0",color:"#2E4E36"}},
          e("div",{style:{fontSize:36,marginBottom:10}},"⛰"),
          e("div",{style:{fontFamily:"monospace",fontSize:13}},"找不到符合條件的山峰")
        )
      )
    ),

    // 群組 TAB
    tab==="群組"&&e("div",{style:{padding:"16px 16px"}},
      e("div",{style:{background:"#0F1912",border:"1px solid #1E3525",borderRadius:14,padding:"14px 18px",marginBottom:12}},
        e("div",{style:{fontSize:11,color:"#3D6B4A",fontFamily:"monospace",marginBottom:10}},"整體完成統計"),
        e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:10}},
          [{val:count,label:"已完成",col:"#52C78A"},{val:100-count,label:"待征服",col:"#3D6B4A"},{val:pct+"%",label:"完成率",col:"#F5A623"}].map(s=>
            e("div",{key:s.label,style:{textAlign:"center"}},
              e("div",{style:{fontSize:24,fontWeight:800,color:s.col,lineHeight:1}},s.val),
              e("div",{style:{fontSize:10,color:"#2E4E36",fontFamily:"monospace",marginTop:3}},s.label)
            )
          )
        ),
        e("div",{style:{background:"#0C1610",borderRadius:5,height:6,overflow:"hidden"}},
          e("div",{style:{height:"100%",borderRadius:5,background:"linear-gradient(90deg,#2A7A50,#52C78A)",width:pct+"%"}})
        )
      ),
      e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
        groupStats.map(g=>{
          const c=g.pct>=80?"#52C78A":g.pct>=50?"#F5A623":g.pct>0?"#5B9BD5":"#2A4030";
          const gPeaks=PEAKS.filter(p=>p.group===g.name);
          return e("div",{key:g.name,style:{background:"#0F1912",border:"1px solid #182A1E",borderRadius:14,padding:"14px 16px"}},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
              e("div",null,
                e("div",{style:{fontSize:15,fontWeight:600,color:"#C8C0AA"}},g.name),
                e("div",{style:{fontSize:11,color:"#2E4E36",fontFamily:"monospace",marginTop:2}},g.done+" / "+g.total+" 座完成")
              ),
              e("div",{style:{fontSize:26,fontWeight:900,color:c}},g.pct+"%")
            ),
            e("div",{style:{background:"#0C1610",borderRadius:4,height:4,overflow:"hidden",marginBottom:10}},
              e("div",{style:{height:"100%",borderRadius:4,background:c,width:g.pct+"%",minWidth:g.pct>0?4:0}})
            ),
            e("div",{style:{display:"flex",flexWrap:"wrap",gap:4}},
              gPeaks.map(p=>e("div",{key:p.id,title:p.name+" "+p.difficulty,className:"dot"+(completed.has(p.id)?" done":""),onClick:()=>toggle(p.id)},completed.has(p.id)?"✓":""))
            ),
            g.done>0&&e("div",{style:{marginTop:8,fontSize:10,color:"#3D6B4A",fontFamily:"monospace",lineHeight:1.6}},
              gPeaks.filter(p=>completed.has(p.id)).map(p=>p.name).join("、")
            )
          );
        })
      )
    ),
    // 裝備 TAB
    tab==="裝備"&&e("div",{style:{padding:"14px 16px"}},

      // 輕裝/重裝切換
      e("div",{style:{display:"flex",gap:8,marginBottom:16}},
        ["輕裝","重裝"].map(t=>e("button",{key:t,onClick:()=>setGearType(t),style:{
          flex:1,padding:"10px 0",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
          background:gearType===t?"#1D4A2A":"#0F1912",
          border:"1px solid "+(gearType===t?"#52C78A":"#1E3525"),
          color:gearType===t?"#7AD9A8":"#3A5E42",
        }},t==="輕裝"?"🥾 輕裝（單日）":"🎒 重裝（多日）"))
      ),

      // 統計
      e("div",{style:{background:"#0F1912",border:"1px solid #1E3525",borderRadius:12,padding:"10px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}},

              }},checked&&e("svg",{width:11,height:11,viewBox:"0 0 12 12",fill:"none"},

              ),
              // 展開箭頭
              e("span",{onClick:()=>setGearDetail(isOpen?null:item.id),style:{color:"#3D6B4A",fontSize:14,cursor:"pointer",transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.2s"}},"›"),
              // 備註點
              note&&e("div",{style:{width:6,height:6,borderRadius:"50%",background:"#F5A623",flexShrink:0}})
            ),
            // 展開細項
            isOpen&&e("div",{style:{
              background:"#0A1410",
              border:"1px solid #1E3525",
              borderTop:"none",
              borderRadius:"0 0 10px 10px",
              padding:"12px 14px",
            }},
              e("div",{style:{fontSize:11,color:"#3D6B4A",fontFamily:"monospace",marginBottom:6}},"個人備註"),
              e("textarea",{
                value:note,
                onChange:ev=>saveNote(item.id,ev.target.value),
                placeholder:"輸入備註，例如：品牌、數量、提醒事項...",
                rows:3,
                style:{
                  width:"100%",background:"#111C14",border:"1px solid #1E3525",
                  borderRadius:8,padding:"8px 10px",color:"#DDD5BE",fontSize:13,
                  fontFamily:"inherit",resize:"none",outline:"none",lineHeight:1.5,
                }
              })
            )
          );
        })
      )),

      e("div",{style:{height:20}})
    ),

    // 回到頂部按鈕
    e("button",{
      onClick:()=>window.scrollTo({top:0,behavior:"smooth"}),
      style:{
        position:"fixed",
        bottom:28,
        right:20,
        width:44,
        height:44,
        borderRadius:"50%",
        background:"#1D4A2A",
        border:"1px solid #52C78A",
        color:"#52C78A",
        fontSize:20,
        cursor:"pointer",
        display:"flex",
        alignItems:"center",
        justifyContent:"center",
        boxShadow:"0 4px 16px #00000066",
        zIndex:99,
      }
    },"↑")
  );
}

// 載入 React 後啟動
import("https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js").catch(()=>{});
window.addEventListener("load",()=>{
  ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
});
</script>
